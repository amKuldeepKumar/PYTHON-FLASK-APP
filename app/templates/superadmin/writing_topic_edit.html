{% extends "layout/dashboard_base.html" %}
{% block title %}Edit Writing Topic • Fluencify{% endblock %}
{% block page_title %}Edit Writing Topic{% endblock %}
{% block content %}
<div class="card border-0 shadow-sm"><div class="card-body p-4">
  <div class="d-flex justify-content-between align-items-center mb-3"><h3 class="mb-0">{{ topic.title }}</h3><a class="btn btn-outline-secondary" href="{{ url_for('superadmin.writing_topics', course_id=topic.course_id) }}">Back</a></div>
  <form method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><div class="row g-3"><div class="col-md-6"><label class="form-label">Title</label><input class="form-control" name="title" value="{{ topic.title }}"></div><div class="col-md-6"><label class="form-label">Category</label><input class="form-control" name="category" value="{{ topic.category or '' }}"></div><div class="col-md-4"><label class="form-label">Level</label><select class="form-select" name="level">{% for item in level_choices %}<option value="{{ item }}" {% if topic.level==item %}selected{% endif %}>{{ item|title }}</option>{% endfor %}</select></div><div class="col-md-4"><label class="form-label">Course Level Number</label><input class="form-control" type="number" min="1" name="course_level_number" value="{{ topic.course_level_number or '' }}"></div><div class="col-md-4"><label class="form-label">Display Order</label><input class="form-control" type="number" min="0" name="display_order" value="{{ topic.display_order or 0 }}"></div><div class="col-12"><label class="form-label">Description</label><textarea class="form-control" rows="5" name="description">{{ topic.description or '' }}</textarea></div><div class="col-md-3"><div class="form-check form-switch mt-4"><input class="form-check-input" type="checkbox" name="is_active" {% if topic.is_active %}checked{% endif %}><label class="form-check-label">Active</label></div></div><div class="col-md-3"><div class="form-check form-switch mt-4"><input class="form-check-input" type="checkbox" name="is_published" {% if topic.is_published %}checked{% endif %}><label class="form-check-label">Published</label></div></div><div class="col-12"><button class="btn btn-primary">Save Changes</button></div></div></form>
</div></div>
{% endblock %}

{% extends "layout/dashboard_base.html" %}
{% block title %}Edit Writing Task • Fluencify{% endblock %}
{% block page_title %}Edit Writing Task{% endblock %}
{% block content %}
<div class="card border-0 shadow-sm"><div class="card-body p-4">
  <div class="d-flex justify-content-between align-items-center mb-3"><h3 class="mb-0">{{ task.title }}</h3><a class="btn btn-outline-secondary" href="{{ url_for('superadmin.writing_tasks', course_id=task.course_id, topic_id=task.topic_id) }}">Back</a></div>
  <form method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><div class="row g-3"><div class="col-md-6"><label class="form-label">Title</label><input class="form-control" name="title" value="{{ task.title }}"></div><div class="col-md-3"><label class="form-label">Task Type</label><select class="form-select" name="task_type">{% for item in task_type_choices %}<option value="{{ item }}" {% if task.task_type==item %}selected{% endif %}>{{ item|title }}</option>{% endfor %}</select></div><div class="col-md-3"><label class="form-label">Level</label><select class="form-select" name="level">{% for item in level_choices %}<option value="{{ item }}" {% if task.level==item %}selected{% endif %}>{{ item|title }}</option>{% endfor %}</select></div><div class="col-md-3"><label class="form-label">Min Words</label><input class="form-control" type="number" min="0" name="min_words" value="{{ task.min_words }}"></div><div class="col-md-3"><label class="form-label">Max Words</label><input class="form-control" type="number" min="0" name="max_words" value="{{ task.max_words or '' }}"></div><div class="col-12"><div class="form-text">Controlled writing works best when max words is greater than min words.</div></div><div class="col-md-3"><label class="form-label">Course Level</label><input class="form-control" type="number" min="1" name="course_level_number" value="{{ task.course_level_number or '' }}"></div><div class="col-md-3"><label class="form-label">Display Order</label><input class="form-control" type="number" min="0" name="display_order" value="{{ task.display_order or 0 }}"></div><div class="col-md-4"><label class="form-label">Language</label><select class="form-select" name="language_code">{% for code,label in language_choices %}<option value="{{ code }}" {% if task.language_code==code %}selected{% endif %}>{{ label }}</option>{% endfor %}</select></div><div class="col-12"><label class="form-label">Instructions</label><textarea class="form-control" rows="7" name="instructions">{{ task.instructions }}</textarea></div><div class="col-md-3"><div class="form-check form-switch mt-4"><input class="form-check-input" type="checkbox" name="is_active" {% if task.is_active %}checked{% endif %}><label class="form-check-label">Active</label></div></div><div class="col-md-3"><div class="form-check form-switch mt-4"><input class="form-check-input" type="checkbox" name="is_published" {% if task.is_published %}checked{% endif %}><label class="form-check-label">Published</label></div></div><div class="col-12"><button class="btn btn-primary">Save Changes</button></div></div></form>
</div></div>
{% endblock %}
